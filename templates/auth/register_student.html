{% extends "base.html" %}
{% block title %}Student Registration{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="card-title mb-4">Student Registration</h4>
        <form method="POST" enctype="multipart/form-data">

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Full Name *</label>
              <input type="text" name="name" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Email *</label>
              <input type="email" name="email" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Password *</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Phone</label>
              <input type="text" name="phone" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label">Roll Number</label>
              <input type="text" name="roll_number" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label">Resume (PDF/DOC)</label>
              <input type="file" name="resume" class="form-control" accept=".pdf,.doc,.docx">
            </div>
            <div class="col-12">
              <label class="form-label">Education</label>
              <input type="text" name="education" class="form-control" placeholder="e.g. B.Tech CSE, CGPA 8.5">
            </div>
            <div class="col-12">
              <label class="form-label">Skills</label>
              <input type="text" name="skills" class="form-control" placeholder="e.g. Python, Flask, SQL">
            </div>
          </div>

          <button type="submit" class="btn btn-success w-100 mt-4">Register</button>
          <div class="text-center mt-2 small">
            Already registered? <a href="{{ url_for('auth.login') }}">Login here</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
