{% extends "base.html" %}
{% block title %}Company Registration{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="card-title mb-4">Company Registration</h4>
        <form method="POST">

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Company Name *</label>
              <input type="text" name="company_name" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Email *</label>
              <input type="email" name="email" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Password *</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">HR Contact *</label>
              <input type="text" name="hr_contact" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Website</label>
              <input type="url" name="website" class="form-control" placeholder="https://example.com">
            </div>
            <div class="col-md-6">
              <label class="form-label">Industry</label>
              <input type="text" name="industry" class="form-control" placeholder="e.g. IT, Finance">
            </div>
            <div class="col-12">
              <label class="form-label">Company Description</label>
              <textarea name="description" class="form-control" rows="3"></textarea>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 mt-4">Submit for Approval</button>
          <div class="text-center mt-2 small">
            Already registered? <a href="{{ url_for('auth.login') }}">Login here</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
