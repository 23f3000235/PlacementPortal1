{% extends "base.html" %}
{% block title %}Edit Drive{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h3 class="mb-0">Edit Placement Drive</h3>
  <a href="{{ url_for('company.dashboard') }}" class="btn btn-outline-secondary btn-sm">← Back</a>
</div>

<div class="card shadow-sm">
  <div class="card-body p-4">
    <form method="POST">
      <div class="row g-3">

        <div class="col-md-6">
          <label class="form-label">Job Title *</label>
          <input type="text" name="job_title" class="form-control"
                 value="{{ drive.job_title }}" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Salary Range</label>
          <input type="text" name="salary_range" class="form-control"
                 value="{{ drive.salary_range or '' }}" placeholder="e.g. 8–12 LPA">
        </div>

        <div class="col-12">
          <label class="form-label">Job Description *</label>
          <textarea name="job_description" class="form-control" rows="4" required>{{ drive.job_description }}</textarea>
        </div>

        <div class="col-12">
          <label class="form-label">Eligibility Criteria</label>
          <textarea name="eligibility_criteria" class="form-control" rows="2">{{ drive.eligibility_criteria or '' }}</textarea>
        </div>

        <div class="col-md-6">
          <label class="form-label">Required Skills</label>
          <input type="text" name="required_skills" class="form-control"
                 value="{{ drive.required_skills or '' }}">
        </div>

        <div class="col-md-6">
          <label class="form-label">Application Deadline *</label>
          <input type="date" name="application_deadline" class="form-control"
                 value="{{ drive.application_deadline }}" required>
        </div>

      </div>

      {% if drive.status == 'Approved' %}
      <div class="alert alert-warning mt-4 mb-0 small">
        Editing an approved drive will re-submit it for admin approval.
      </div>
      {% endif %}

      <button type="submit" class="btn btn-primary mt-3">Save Changes</button>
    </form>
  </div>
</div>
{% endblock %}
