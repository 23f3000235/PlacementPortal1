{% extends "base.html" %}
{% block title %}Post New Drive{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h3 class="mb-0">Post New Placement Drive</h3>
  <a href="{{ url_for('company.dashboard') }}" class="btn btn-outline-secondary btn-sm">← Back</a>
</div>

<div class="card shadow-sm">
  <div class="card-body p-4">
    <form method="POST">
      <div class="row g-3">

        <div class="col-md-6">
          <label class="form-label">Job Title *</label>
          <input type="text" name="job_title" class="form-control" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Salary Range</label>
          <input type="text" name="salary_range" class="form-control" placeholder="e.g. 8–12 LPA">
        </div>

        <div class="col-12">
          <label class="form-label">Job Description *</label>
          <textarea name="job_description" class="form-control" rows="4" required></textarea>
        </div>

        <div class="col-12">
          <label class="form-label">Eligibility Criteria</label>
          <textarea name="eligibility_criteria" class="form-control" rows="2"
                    placeholder="e.g. B.Tech, CGPA ≥ 7.0, No active backlogs"></textarea>
        </div>

        <div class="col-md-6">
          <label class="form-label">Required Skills</label>
          <input type="text" name="required_skills" class="form-control"
                 placeholder="e.g. Python, SQL, Communication">
        </div>

        <div class="col-md-6">
          <label class="form-label">Application Deadline *</label>
          <input type="date" name="application_deadline" class="form-control" required>
        </div>

      </div>

      <div class="alert alert-info mt-4 mb-0 small">
        This drive will be submitted for admin approval before students can apply.
      </div>

      <button type="submit" class="btn btn-primary mt-3">Submit for Approval</button>
    </form>
  </div>
</div>
{% endblock %}
