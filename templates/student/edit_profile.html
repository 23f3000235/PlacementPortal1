{% extends "base.html" %}
{% block title %}Edit Profile{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h3 class="mb-0">Edit Profile</h3>
  <a href="{{ url_for('student.dashboard') }}" class="btn btn-outline-secondary btn-sm">← Dashboard</a>
</div>

<div class="card shadow-sm">
  <div class="card-body p-4">
    <form method="POST" enctype="multipart/form-data">
      <div class="row g-3">

        <div class="col-md-6">
          <label class="form-label">Full Name *</label>
          <input type="text" name="name" class="form-control"
                 value="{{ student.name }}" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" class="form-control"
                 value="{{ student.email }}" disabled>
          <small class="text-muted">Email cannot be changed.</small>
        </div>

        <div class="col-md-6">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control"
                 value="{{ student.phone or '' }}">
        </div>

        <div class="col-md-6">
          <label class="form-label">Roll Number</label>
          <input type="text" name="roll_number" class="form-control"
                 value="{{ student.roll_number or '' }}">
        </div>

        <div class="col-12">
          <label class="form-label">Education</label>
          <input type="text" name="education" class="form-control"
                 value="{{ student.education or '' }}"
                 placeholder="e.g. B.Tech CSE, CGPA 8.5">
        </div>

        <div class="col-12">
          <label class="form-label">Skills</label>
          <input type="text" name="skills" class="form-control"
                 value="{{ student.skills or '' }}"
                 placeholder="e.g. Python, Flask, SQL">
        </div>

        <div class="col-12">
          <label class="form-label">
            Resume (PDF/DOC)
            {% if student.resume_filename %}
              — <a href="{{ url_for('static', filename='uploads/' + student.resume_filename) }}"
                   target="_blank" class="small">View current</a>
            {% endif %}
          </label>
          <input type="file" name="resume" class="form-control" accept=".pdf,.doc,.docx">
          <small class="text-muted">Leave empty to keep existing resume.</small>
        </div>

        <div class="col-md-6">
          <label class="form-label">New Password</label>
          <input type="password" name="new_password" class="form-control"
                 placeholder="Leave empty to keep current password">
        </div>

      </div>

      <button type="submit" class="btn btn-primary mt-4">Save Changes</button>
    </form>
  </div>
</div>
{% endblock %}
